[package]
name = "tactics"
version = "0.1.0"
edition = "2024"
publish = false

[features]
default = []
shaderson = ["adapterlibgfx/shaderson"]

[dependencies]
adapterlibgfx = { path = "adapterlibgfx" }
asefile = "0.3.8"
image = { version = "0.25.8", default-features = false, features = ["png"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"

[profile.dev.package.asefile]
opt-level = 2
